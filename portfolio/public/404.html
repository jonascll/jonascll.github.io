<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>

      const path = window.location.pathname;
      const query = window.location.search;
      const hash = window.location.hash;

      window.location.replace(
        "/?redirect=" + encodeURIComponent(path + query + hash)
      );
    </script>
  </head>
  <body></body>
</html>
